  - target_language: Japanese
    source_text: The protected arrival gate where visitors enter shared city records for the first time.
    localized_text: "来訪者が初めて共有都市記録へ入る、守られた到着門。"
  - target_language: Japanese
    source_text: "The opening chapter of GESTALOKA: Nexus Foundation now turns on whether First Stabilizer Request will be carried through."
    localized_text: "ゲスタロカ：ネクサス基盤の幕開けは、最初の安定化依頼が果たされるかどうかへ向かっている。"
  - target_language: Japanese
    source_text: Nexus Gate is waiting to see whether First Stabilizer Request will be honored. The scene has room to breathe, but it still remembers what was just set in motion.
    localized_text: "ネクサス・ゲートは、最初の安定化依頼が守られるかを見届けようとしている。場には息をつく余地があるが、動き出したばかりの出来事をまだ覚えている。"
  - target_language: Japanese
    source_text: The tower concourse opens above the gate, where public testimony and route ledgers meet.
    localized_text: "門の上にはリフト・タワー・コンコースが開け、公開証言と航路台帳が交わっている。"
  - target_language: Japanese
    source_text: The breach route stays sealed until Nexus recognizes the writ.
    localized_text: "裂け目への道は、ネクサスが認可状を認めるまで封じられている。"
  - target_language: Japanese
    source_text: A witnessed writ that marks the bearer as trusted for the first restoration route.
    localized_text: "最初の修復路に進む信頼を帯びた者だと示す、証人付きの認可状。"
