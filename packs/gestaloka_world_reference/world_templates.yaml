world_templates:
  layered_world_foundation:
    template_id: layered_world_foundation
    display_name: Layered World Foundation
    summary: A world-scale GESTALOKA foundation where visitors enter Nexus and their logs can alter corporations, churches, markets, ruins, and the spread of oblivion.
    world:
      world_id: gestaloka_world_reference
      default_name: "GESTALOKA: Layered World Foundation"
    roles:
      starter_location_key: nexus_city
      lore_location_key: universal_library
      followup_location_key: oblivion_regions
      guide_npc_name: ""
      guide_archetype_id: nexus_entry_liaison
      starter_stage_key: visitor_log_registration
      followup_stage_key: oblivion_survey
      opening_chapter_key:
      followup_chapter_key:
      reward_effect_kind: unlock_oblivion_regions_route
      followup_branches:
        formal_path:
          branch_key: public_archive_mandate
          label: Public Archive Mandate
          summary: The visitor's early log is witnessed by Nexus, the Memory Church, and the Universal Library.
          committed_summary: The route now treats the visitor's work as public record instead of private leverage.
          player_hint: Public witness and archive continuity shape the next stage.
          signal_weights:
            formal_trust: 0.14
            kept_formal_promise: 0.12
            public_scrutiny: 0.1
            street_pull: -0.03
          anchor_npcs:
            - nexus_entry_liaison
            - memory_church
            - universal_library
        undercurrent_path:
          branch_key: edge_market_compact
          label: Edge Market Compact
          summary: The visitor's early log moves through markets, brokers, field crews, and Middle rumor channels.
          committed_summary: The route now follows field evidence and negotiated risk before official institutions can certify it.
          player_hint: Market leverage, frontier evidence, and unofficial trust shape the next stage.
          signal_weights:
            rumor_curiosity: 0.13
            street_pull: 0.13
            corporate_pressure: 0.05
            formal_trust: -0.02
          anchor_npcs:
            - middle_information_broker
            - chronos_communications
            - middle_lawless_zone
    bootstrap:
      opening_title: ネクサス市
      opening_narrative: |-
        基点都市ネクサス。あなたは未知の来訪者として登録され、階層世界ゲスタロカへ接続した最初の記録を与えられた。

        頭上には昇降塔が雲を貫き、公開登録所、企業勧誘窓口、万象図書館へ向かう案内灯が同じ広場に並んでいる。あなたの到着は、ただの受付ではない。外部から来た新しい情報として、世界の残響に刻まれようとしている。

        ネクサス案内担当カナタは、まず街の各所を見てから来訪者ログの扱いを決めてよいと告げる。公開証言、企業契約、古い記録照合のどれも、まだあなたの所属を確定しない。
      opening_situation: 基点都市ネクサスは来訪者を守る安全都市であり、到着ログの扱いを決める前に街の制度、企業勧誘、記録照合を見て回れる。
      opening_pressure: ネクサス、機憶教団、クロノス、企業勧誘窓口が、新しい来訪者ログの行き先を静かに待っている。
      opening_title_en: Nexus City
      opening_narrative_en: |-
        Nexus City is the protected first city for visitors who connect to the layered world of GESTALOKA. You have been registered as an unknown visitor and given your first arrival log.

        Above you, lift towers cut through the clouds. Around the same plaza, guide lights point toward public registry halls, corporate recruitment desks, and the Universal Library. Your arrival is not just intake. It is new outside information entering the world's resonance logs.

        Nexus Entry Liaison Kanata explains that you can look around before deciding how the visitor log will be handled. Public witness, corporate contract, and archive comparison are all available without fixing your allegiance yet.
      opening_situation_en: Nexus City protects new visitors and lets them inspect civic records, corporate recruitment, and archive checks before committing their arrival log.
      opening_pressure_en: Nexus, the Memory Church, Chronos, and corporate recruiters are quietly waiting to see where the new visitor log goes.
      opening_choices:
        - choice_id: choice_1
          label: ネクサス公開登録所で到着ログを確認する
          summary: 公開証言ホールを見て、来訪者ログが街の制度ではどう扱われるかを知る。
          canonical_input_text: ネクサス公開登録所で到着ログを確認する
          action_kind: narrative
        - choice_id: choice_2
          label: 昇降塔ネットワークへ向かい、企業勧誘と交通ログを見る
          summary: 所属を決めずに、企業窓口、昇降塔の行き先、契約のリスクを確認する。
          canonical_input_text: 昇降塔ネットワークへ向かい、企業勧誘と交通ログを見る
          action_kind: travel
          travel_target_key: lift_tower_network
        - choice_id: choice_3
          label: 万象図書館へ向かい、古い記録と来訪者ログを照合する
          summary: 公開や契約へ進む前に、ゲスタロカの正史と到着ログの整合を確かめる。
          canonical_input_text: 万象図書館へ向かう
          action_kind: travel
          travel_target_key: universal_library
      opening_choices_en:
        - choice_id: choice_1
          label: Check your arrival log at the public Nexus registry
          summary: Visit the witness halls and learn how the city records an unknown visitor.
          canonical_input_text: Check your arrival log at the public Nexus registry
          action_kind: narrative
        - choice_id: choice_2
          label: Go to the lift tower network and inspect recruiters and route logs
          summary: Read corporate desks, lift destinations, and contract risks before committing to any affiliation.
          canonical_input_text: Travel to the lift tower network and inspect recruiters and route logs
          action_kind: travel
          travel_target_key: lift_tower_network
        - choice_id: choice_3
          label: Go to the Universal Library and compare old records with your visitor log
          summary: Check the official archive before choosing whether the arrival log becomes public record or contract leverage.
          canonical_input_text: Travel to the Universal Library
          action_kind: travel
          travel_target_key: universal_library
      start_consequence_summary: Nexus waits while the unknown visitor decides which part of the city to inspect first.
      session_started_narrative: >-
        {player_name} entered {starter_location_name} and began a visitor log under the attention of {guide_npc_name}.
      reward_unlock_summary: Visitor Log Seal unlocked a surveyed route toward the Oblivion Regions.
      reward_use_narrative: >-
        {player_name} presented {reward_name} at {starter_location_name}, and {faction_name} acknowledged a route toward the fading strata.
      reward_location_memory: >-
        {reward_name} was recognized at {starter_location_name}, opening a route toward the Oblivion Regions.
      reward_world_memory: >-
        {player_name} used {reward_name} to move from first contact into a world-scale oblivion survey.
