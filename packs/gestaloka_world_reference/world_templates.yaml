    faction:
      id: nexus_city
      name: Nexus City
      description: The protected anchor city that makes visitor actions legible without forcing a destiny on them.
      state:
        doctrine: protect first contact and keep new logs accountable to the same world
    world_axes:
      - id: world_integrity
        display_name: World Integrity
        description: How coherently GESTALOKA preserves meaning, places, identities, and official history.
        min_value: 0
        max_value: 100
        initial_value: 52
        thresholds:
          - key: brittle
            label: Brittle World
            value: 25
            description: Records and communities contradict each other faster than institutions can reconcile them.
          - key: coherent
            label: Coherent World
            value: 70
            description: Local actions can become reliable shared history.
      - id: astralnet_load
        display_name: Astralnet Load
        description: Pressure on the magical information network that powers skills, communication, and infrastructure.
        min_value: 0
        max_value: 100
        initial_value: 58
        thresholds:
          - key: smooth
            label: Smooth Flow
            value: 30
            description: Scripts and communication remain reliable.
          - key: saturated
            label: Saturated Net
            value: 78
            description: Delays, data ghosts, and distorted skills become common.
      - id: magic_crystal_economy
        display_name: Magic Crystal Economy
        description: Stability of the crystal economy used for currency, artifacts, tools, logistics, and war.
        min_value: 0
        max_value: 100
        initial_value: 50
        thresholds:
          - key: strained
            label: Strained Circulation
            value: 25
            description: Shortages and hoarding shape daily decisions.
          - key: liquid
            label: Liquid Circulation
            value: 70
            description: Trade and recovery work can move without constant scarcity.
      - id: corporate_hegemony
        display_name: Corporate Hegemony
        description: How strongly corporations govern cities, resources, routes, research, and conflict.
        min_value: 0
        max_value: 100
        initial_value: 62
        thresholds:
          - key: checked
            label: Checked Power
            value: 35
            description: Public institutions and independent cities can limit corporate reach.
          - key: dominant
            label: Dominant Power
            value: 80
            description: Corporate contracts decide what most communities can afford to remember or defend.
      - id: artifact_control
        display_name: Artifact Control
        description: Who can find, protect, activate, or weaponize Architect artifacts.
        min_value: 0
        max_value: 100
        initial_value: 46
        thresholds:
          - key: dispersed
            label: Dispersed Control
            value: 30
            description: Local groups and scholars can contest artifact access.
          - key: monopolized
            label: Monopolized Control
            value: 75
            description: A few powers can rewrite the world at scale.
      - id: visitor_resonance
        display_name: Visitor Resonance
        description: How powerfully outside visitors create new logs, echoes, stories, and social change.
        min_value: 0
        max_value: 100
        initial_value: 40
        thresholds:
          - key: faint
            label: Faint Resonance
            value: 20
            description: Visitor actions remain local anecdotes.
          - key: legendary
            label: Legendary Resonance
            value: 75
            description: Visitor logs reshape routes, communities, and official history.
      - id: oblivion_expansion
        display_name: Oblivion Expansion
        description: The spread of corrupted context and fading regions where meaning collapses toward nothing.
        min_value: 0
        max_value: 100
        initial_value: 49
        thresholds:
          - key: contained
            label: Contained Fading
            value: 25
            description: Restoration camps can work without mass panic.
          - key: spreading
            label: Spreading Oblivion
            value: 80
            description: Communities, routes, and memories begin disappearing from shared context.
