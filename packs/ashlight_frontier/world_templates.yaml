    faction:
      id: adventurers_guild
      name: Adventurers Guild
      description: The public institution that turns unstructured concerns into confirmable work without forcing a single opening incident.
      state:
        doctrine: confirm rumors through fieldwork, protect public trust, and train new adventurers through accountable first steps
    world_axes:
      - id: lamp_stability
        display_name: Lamp Stability
        description: How strongly lamps stabilize towns, roads, and remembered geography.
        min_value: 0
        max_value: 1
        initial_value: 0.62
        expose_to_session_context: true
        thresholds:
          - key: wavering
            label: Wavering Light
            value: 0.3
            description: Boundaries and routes become easier to misread.
          - key: steady
            label: Steady Light
            value: 0.7
            description: Safe places and known roads hold their shape reliably.
      - id: mist_encroachment
        display_name: Mist Encroachment
        description: How much night mist pressure shapes unstable terrain and memory phenomena.
        min_value: 0
        max_value: 1
        initial_value: 0.32
        expose_to_session_context: true
        thresholds:
          - key: quiet
            label: Quiet Mist
            value: 0.25
            description: Mist-side signs remain subtle and mostly distant.
          - key: pressing
            label: Pressing Mist
            value: 0.7
            description: Unstable paths and memory conflicts become more frequent.
      - id: frontier_trust
        display_name: Frontier Trust
        description: How much local residents, guild staff, and town institutions trust the player.
        min_value: 0
        max_value: 1
        initial_value: 0.2
        expose_to_session_context: true
        thresholds:
          - key: unproven
            label: Unproven
            value: 0.2
            description: People share surface concerns but little private context.
          - key: trusted
            label: Trusted
            value: 0.65
            description: Private details and sensitive requests become easier to access.
      - id: guild_authority
        display_name: Guild Authority
        description: How strongly the guild can formalize concerns into public requests.
        min_value: 0
        max_value: 1
        initial_value: 0.5
        expose_to_session_context: true
        thresholds:
          - key: informal
            label: Informal Work
            value: 0.3
            description: Resident concerns and unofficial favors grow more common.
          - key: formal
            label: Formal Mandate
            value: 0.7
            description: Confirmed concerns become official guild work more easily.
      - id: church_influence
        display_name: Church Influence
        description: How strongly records, rites, mourning, and taboos shape local interpretation.
        min_value: 0
        max_value: 1
        initial_value: 0.45
        expose_to_session_context: true
        thresholds:
          - key: practical
            label: Practical Readings
            value: 0.3
            description: Field reports outweigh ritual readings.
          - key: interpretive
            label: Interpretive Records
            value: 0.7
            description: Records and rites heavily shape how concerns are understood.
      - id: trade_pressure
        display_name: Trade Pressure
        description: Pressure around caravans, lamp crystals, road economy, contracts, and information sale.
        min_value: 0
        max_value: 1
        initial_value: 0.4
        expose_to_session_context: true
        thresholds:
          - key: calm
            label: Calm Trade
            value: 0.25
            description: Merchant concerns stay small and negotiable.
          - key: strained
            label: Strained Trade
            value: 0.7
            description: Routes, prices, escorts, and rumors become urgent to merchants.
      - id: rumor_volatility
        display_name: Rumor Volatility
        description: How tangled unconfirmed information is before the player confirms a local situation.
        min_value: 0
        max_value: 1
        initial_value: 0.5
        expose_to_session_context: true
        thresholds:
          - key: clear
            label: Clear Reports
            value: 0.25
            description: Concerns arrive with relatively clear first steps.
          - key: tangled
            label: Tangled Rumors
            value: 0.75
            description: Exaggeration, error, and witness disagreement are common.
      - id: personal_fit_signal
        display_name: Personal Fit Signal
        description: How strongly the player's self-description and first choices shape what kind of first situation emerges.
        min_value: 0
        max_value: 1
        initial_value: 0
        expose_to_session_context: true
        thresholds:
          - key: unexpressed
            label: Unexpressed Fit
            value: 0.1
            description: The player has not yet described a preferred style of work.
          - key: clear
            label: Clear Fit
            value: 0.6
            description: The first local situation should reflect the player's stated strengths or interests.
