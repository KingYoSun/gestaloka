world_templates:
  ashlight_frontier_foundation:
    template_id: ashlight_frontier_foundation
    display_name: Ashlight Frontier Foundation
    summary: A low-context first-play fantasy frontier where the player's attention dynamically instantiates the first local situation.
    world:
      world_id: ashlight_frontier
      default_name: "灰灯の辺境: Ashlight Frontier"
      situation_grammar:
        pressure_sources:
          - lamp instability
          - mist uncertainty
          - trade disruption
          - local memory conflict
          - institutional distrust
          - frontier resource shortage
          - route ambiguity
          - witness disagreement
          - old record contradiction
          - personal request from an unknown local
        affected_domains:
          - road
          - forest
          - well
          - mine
          - church record
          - market rumor
          - town gate
          - farmstead
          - abandoned shrine
          - caravan stop
          - guild board
          - family household
          - old boundary marker
        human_stakes:
          - someone needs help
          - someone is hiding information
          - two witnesses disagree
          - a route may be unsafe
          - a local custom conflicts with guild procedure
          - a resource is running low
          - an old record contradicts current memory
          - someone asks for discretion
          - a public authority wants delay
          - a private person wants immediate action
        uncertainty_modes:
          - rumor may be false
          - report may be exaggerated
          - witness may be mistaken
          - cause is misattributed
          - problem is real but location is wrong
          - visible problem is a symptom, not the cause
          - multiple factions interpret the same sign differently
          - the player's first assumption may be incomplete
        situation_shapes:
          - investigation
          - rescue
          - escort
          - negotiation
          - recovery
          - boundary survey
          - rumor verification
          - record comparison
          - mediation
          - containment
          - route finding
        tone_modifiers:
          - cozy frontier
          - quiet unease
          - fairy-tale strangeness
          - grounded guild work
          - local human trouble
          - low-stakes first job
          - gradually widening mystery
      rumor_grammar:
        rumor_source_types:
          - guild receptionist
          - tired traveler
          - merchant clerk
          - church novice
          - gate guard
          - local child
          - old resident
          - caravan driver
          - apprentice adventurer
          - quiet craftsman
        rumor_certainty_levels:
          - hearsay
          - repeated concern
          - first-hand report
          - conflicting testimonies
          - official note awaiting confirmation
          - private request
          - suppressed report
        rumor_presentation_rules:
          - Before confirmation, never state the rumor as fact.
          - Use uncertain phrasing.
          - Attach at least one reason the rumor may be incomplete.
          - Avoid making the rumor immediately solvable.
          - Let player attention decide which rumor becomes concrete.
      quest_emergence_policy:
        require_player_attention_basis: true
        require_uncertainty: true
        require_first_step: true
        reject_opening_fixed_incident: true
      quest_generation_constraints:
        must_arise_from_player_attention: true
        must_include_uncertainty_at_first: true
        must_specify_first_actionable_step: true
        must_have_two_plausible_interpretations: true
        avoid_revealing_true_cause_immediately: true
        keep_first_session_small_but_expandable: true
        reject_named_npc_predetermined_harm: true
        may_reference_location_faction_or_archetype_only_after_attention: true
    roles:
      starter_location_key: lieber_lampfort
      lore_location_key: lantern_church_archive
      followup_location_key: mistbound_frontier
      guide_npc_name: ""
      guide_archetype_id: guild_receptionist
      starter_stage_key: first_attention
      followup_stage_key: mistbound_survey
      opening_chapter_key:
      followup_chapter_key:
      reward_effect_kind: unlock_mistbound_frontier_route
      followup_branches:
        formal_path:
          branch_key: lantern_guild_mandate
          label: Lantern Guild Mandate
          summary: The player's early attention is shaped through guild procedure, public trust, lamp stewardship, and institutional responsibility.
          committed_summary: The next route treats the player as a recognized frontier adventurer trusted with public-facing stabilization work.
          player_hint: Public trust, careful confirmation, rescue, and lamp stewardship shape the next stage.
          signal_weights:
            frontier_trust: 0.12
            guild_authority: 0.1
            careful_observation: 0.08
            rumor_curiosity: -0.02
          anchor_npcs:
            - guild_receptionist
            - lamp_warden
            - lantern_church
        undercurrent_path:
          branch_key: mist_witch_compact
          label: Mist Witch Compact
          summary: The player's early attention follows rumors, local intuition, hidden paths, and people who understand the night mist outside official procedure.
          committed_summary: The next route follows local rumors, hidden paths, negotiated trust, and uncertain discoveries beyond official records.
          player_hint: Curiosity, unofficial trust, and mist-side discoveries shape the next stage.
          signal_weights:
            rumor_curiosity: 0.12
            trade_pressure: 0.06
            church_influence: -0.02
            guild_authority: -0.02
          anchor_npcs:
            - mist_witch
            - free_merchants
            - mistbound_frontier
    bootstrap:
      opening_title: Lieber Lampfort
      opening_narrative: |-
        You are a newly registered adventurer in Lieber Lampfort, a frontier town protected by a white lamp tower.

        The adventurers' guild hall is busy with travelers, scouts, merchants, and local messengers. The board does not present a neat list of fixed quests. It is a living surface of notes, requests, rumors, witness fragments, route warnings, and unfinished reports.

        Guild Receptionist Elna explains that new adventurers are not forced into a single request. You can first ask what kinds of concerns are gathering, inspect the board, visit town facilities, speak with non-guild locals, describe the kind of work you are suited for, or choose a direction beyond the lamps.

        Outside the windows, thin night mist waits beyond the town lights. It looks less like an immediate attack than a reminder that the frontier still has places no one has fully checked.
      opening_situation: Lieber Lampfort is a frontier town stabilized by a white lamp tower. The player has just registered at the adventurers' guild and can decide what kind of concern, place, person, institution, or frontier direction to attend to first.
      opening_pressure: The guild, church, merchants, frontier authorities, and local residents all carry partial concerns. The new adventurer's first attention may decide which local situation becomes concrete.
      opening_choices:
        - choice_id: choice_1
          label: Ask the guild receptionist what kinds of concerns are gathering
          summary: Ask Elna to organize recent concern categories and rumors without naming a fixed request.
          canonical_input_text: Ask the guild receptionist what kinds of concerns are gathering
          action_kind: narrative
        - choice_id: choice_2
          label: Inspect the board for the direction that interests you
          summary: Look across partial notes, witness fragments, and requests to choose a direction of attention rather than a fixed quest.
          canonical_input_text: Inspect the board for the direction that interests you
          action_kind: narrative
        - choice_id: choice_3
          label: View the boundary between lamplight and night mist
          summary: Go near the gate and see what the outside of Lieber Lampfort feels like without assuming a specific road incident.
          canonical_input_text: View the boundary between lamplight and night mist
          action_kind: travel
          travel_target_key: lampfort_outer_gate
        - choice_id: choice_4
          label: Ask people outside the guild about recent concerns
          summary: Speak with market people, church staff, guards, travelers, and residents about anxieties that are not yet formal requests.
          canonical_input_text: Ask people outside the guild about recent concerns
          action_kind: narrative
        - choice_id: choice_5
          label: Ask Elna what first work would fit you
          summary: Let your strengths, temperament, and desired play style help shape the first local situation dynamically.
          canonical_input_text: Ask Elna what first work would fit you
          action_kind: narrative
      localized_bootstrap:
        ja:
          opening_title: リーベル灯砦
          opening_narrative: |-
            あなたは、王国西端の町「リーベル灯砦」に着いたばかりの新米冒険者です。

            町の中央には、白い炎をともす灯柱が立っています。その灯りが届く範囲では、道も建物も昨日と同じ形を保ちます。

            冒険者ギルドの広間には、旅人、斥候、商人、町の使いが出入りしています。掲示板には、整理済みの依頼だけでなく、相談、噂、目撃談、経路の注意書き、まだ真偽の分からない報告が重なっています。

            受付係エルナは、あなたに言います。

            「最初の仕事は、ここで決め打ちするものではありません。まずは話を聞いてもいいし、掲示板を眺めてもいい。町を歩いて、人に会って、自分に向いている仕事を探してもかまいません。この辺境では、どこへ目を向けるかで、最初に立ち上がる問題が変わります」

            窓の外では、町の灯りの向こうに薄い夜霧が見えています。それは今すぐ襲ってくる脅威というより、辺境の外側にはまだ確かめられていない場所がある、という印のように見えます。
          opening_situation: リーベル灯砦は白い灯柱に守られた辺境都市であり、プレイヤーは冒険者ギルドに登録したばかりである。最初にどの種類の相談、場所、人物、施設、辺境の方向へ関心を向けるかは、まだ決まっていない。
          opening_pressure: ギルド、教会、商人、辺境伯側、住民たちは、それぞれ断片的な相談や気がかりを抱えている。新米冒険者が最初にどこへ関心を向けるかによって、どの地域の状況が具体化するかが変わる。
          opening_choices:
            - choice_id: choice_1
              label: ギルド受付に、いま多い相談の傾向を聞く
              summary: 受付係エルナから、特定の依頼名ではなく、最近どの種類の相談や噂が増えているのかを整理してもらう。
              canonical_input_text: ギルド受付に、いま多い相談の傾向を聞く
              action_kind: narrative
            - choice_id: choice_2
              label: 掲示板を眺め、自分が気になる問題の方向を探す
              summary: 固定された依頼リストではなく、掲示板上の断片的な相談や目撃談から、自分が関わりたい方向を探す。
              canonical_input_text: 掲示板を眺め、自分が気になる問題の方向を探す
              action_kind: narrative
            - choice_id: choice_3
              label: 町の外縁から、灯りと夜霧の境界を見る
              summary: 町の門や外壁近くへ行き、リーベル灯砦の外側がどのような雰囲気なのかを自分の目で確かめる。
              canonical_input_text: 町の外縁から、灯りと夜霧の境界を見る
              action_kind: travel
              travel_target_key: lampfort_outer_gate
            - choice_id: choice_4
              label: ギルド外の人々に、最近の気がかりを聞く
              summary: 市場、教会、門番、旅人、住民などから、公式依頼になる前の不安や噂を聞いてみる。
              canonical_input_text: ギルド外の人々に、最近の気がかりを聞く
              action_kind: narrative
            - choice_id: choice_5
              label: 自分に向いた最初の仕事をエルナに相談する
              summary: プレイヤーの得意分野、性格、望む遊び方に応じて、最初の状況が動的に立ち上がるよう相談する。
              canonical_input_text: 自分に向いた最初の仕事をエルナに相談する
              action_kind: narrative
      start_consequence_summary: Lieber Lampfort waits while the new adventurer chooses a first direction of attention.
      session_started_narrative: >-
        {player_name} arrived in {starter_location_name} as a newly registered adventurer and began choosing a first thread of attention with {guide_npc_name}.
      reward_unlock_summary: Provisional Lamp Badge unlocked a surveyed route toward the Mistbound Frontier.
      reward_use_narrative: >-
        {player_name} presented {reward_name} at {starter_location_name}, and {faction_name} acknowledged a route toward deeper frontier work.
      reward_location_memory: >-
        {reward_name} marked that {player_name} had chosen a first local thread and could approach the Mistbound Frontier.
      reward_world_memory: >-
        {player_name} used {reward_name} to move from first attention into broader frontier survey work.
