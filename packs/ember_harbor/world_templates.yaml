world_templates:
  ember_harbor:
    template_id: ember_harbor
    display_name: Ember Harbor
    summary: A tide-marked harbor where favors, notices, and sealed routes shape the opening slice.
    world:
      default_name: Ember Harbor
    roles:
      starter_location_key: quay
      lore_location_key: tide_market
      followup_location_key: breakwater
      guide_npc_name: Runner Eska
      starter_stage_key: starter_watch
      followup_stage_key: watch_path_followup
      opening_chapter_key: founders_watch_opening
      followup_chapter_key: watch_path_followup
      reward_effect_kind: unlock_followup_watch_path
      branch_labels:
        watch_oath: Beacon Oath
        lantern_whispers: Tide Whispers
    bootstrap:
      start_consequence_summary: The harbor wardens wait for your first move.
      session_started_narrative: >-
        {player_name}は{starter_location_name}でセッションを開始し、
        {guide_npc_name}から{faction_name}の最初の依頼を受けた。
      reward_unlock_summary: Harbor Seal unlocked the breakwater route.
      reward_use_narrative: >-
        {player_name}は{starter_location_name}で{reward_name}を掲げ、
        {faction_name}にbreakwaterへの道を開く許しを受けた。
      reward_location_memory: >-
        {starter_location_name}で{reward_name}が使われ、breakwaterへの道が解放された。
      reward_world_memory: >-
        {player_name}は{reward_name}を使い、{faction_name}の次の依頼段階への道を開いた。
    locations:
      quay:
        id: ember_quay
        starter: true
        name: Ember Quay
        description: The harborfront landing where new arrivals meet the wardens and the tide's first rumors.
      tide_market:
        id: tide_market
        name: Tide Market
        description: Salt-marked stalls and notice rails where records, bargains, and half-heard reports collect.
      breakwater:
        id: breakwater
        name: Cinder Breakwater
        description: A sealed outer path along the harbor wall, opened only when the wardens recognize a seal.
    routes:
      - route_key: quay_to_market
        from: quay
        to: tide_market
        status: open
        travel_summary: The market road opens inland, where tide reports and dockside favors get sorted.
        unlock_requirements: {}
      - route_key: market_to_quay
        from: tide_market
        to: quay
        status: open
        travel_summary: The road back to Ember Quay stays clear, carrying every rumor toward the harborfront.
        unlock_requirements: {}
      - route_key: quay_to_breakwater
        from: quay
        to: breakwater
        status: locked
        travel_summary: The breakwater gate stays sealed until the wardens accept the seal's authority.
        unlock_requirements:
          starter_item_effect: unlock_followup_watch_path
      - route_key: breakwater_to_quay
        from: breakwater
        to: quay
        status: locked
        travel_summary: The outer wall bends back toward Ember Quay once the seal has opened the route.
        unlock_requirements:
          starter_item_effect: unlock_followup_watch_path
    faction:
      id: ember_wardens
      name: Ember Wardens
      description: Harbor keepers who turn small favors into standing and keep the outer wall secure.
      state:
        doctrine: steady the harbor and reward reliable hands
    quest:
      id: starter_harbor_request
      title: First Harbor Request
      description: Help a dockside local, report what you found, and earn the wardens' trust.
      stage_key: starter_watch
      unlock_requirements: {}
      completion_target: 2
      reward_template_key: harbor_seals
      reward_name: Harbor Seal
      reward_description: A stamped harbor seal that marks the bearer as a trusted hand along the quay.
      state:
        reward_enabled: true
        reward_effect_kind: unlock_followup_watch_path
        reward_effect_payload:
          unlock_stage_key: watch_path_followup
    followup_quest:
      id: followup_breakwater
      title: Breakwater Unsealed
      description: Carry the harbor's trust out to the breakwater and steady what waits beyond the gate.
      stage_key: watch_path_followup
      unlock_requirements:
        starter_item_effect: unlock_followup_watch_path
      completion_target: 1
      reward_template_key: none
      reward_name: ""
      reward_description: ""
      state:
        reward_enabled: false
    character:
      rank: Rook
      hp: 10
      focus: 5
      status_json:
        origin: ember_harbor
        onboarding: starter_slice
