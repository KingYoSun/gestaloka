world_templates:
  ember_harbor:
    template_id: ember_harbor
    display_name: Ember Harbor
    summary: A tide-marked harbor where favors, notices, and sealed routes shape the opening slice.
    world:
      world_id: ember_harbor
      default_name: Ember Harbor
    roles:
      starter_location_key: quay
      lore_location_key: tide_market
      followup_location_key: breakwater
      guide_npc_name: Runner Eska
      starter_stage_key: starter_harbor
      followup_stage_key: breakwater_unsealed
      opening_chapter_key: ember_harbor_opening
      followup_chapter_key: ember_breakwater_followup
      reward_effect_kind: unlock_breakwater_route
      followup_branches:
        formal_path:
          branch_key: beacon_oath
          label: Beacon Oath
          summary: Beacon Oath carries the breakwater route through posted duties and wardens' trust.
          committed_summary: The follow-up route has committed to Beacon Oath, carrying the breakwater through posted duties and wardens' trust.
          player_hint: The chapter now leans toward Beacon Oath and the duties the wardens can openly recognize.
          signal_weights:
            formal_trust: 0.12
            kept_formal_promise: 0.15
            rumor_curiosity: -0.02
            street_pull: -0.02
            public_scrutiny: 0.03
            reward_item_commitment: 0.1
          anchor_npcs:
            - Tide-Scribe Miro
        undercurrent_path:
          branch_key: tide_whispers
          label: Tide Whispers
          summary: Tide Whispers follows dockside reports, offstage movement, and the harbor's half-heard notices.
          committed_summary: The follow-up route has committed to Tide Whispers, carrying the breakwater through dockside reports and offstage movement.
          player_hint: The chapter now leans toward Tide Whispers and the quieter pull around the harbor wall.
          signal_weights:
            formal_trust: -0.02
            kept_formal_promise: -0.03
            rumor_curiosity: 0.12
            street_pull: 0.12
            public_scrutiny: 0.08
            reward_item_commitment: 0.02
          anchor_npcs:
            - Runner Eska
            - Beacon-Keeper Sol
    bootstrap:
      start_consequence_summary: The harbor wardens wait for your first move.
      session_started_narrative: >-
        {player_name}は{starter_location_name}でセッションを開始し、
        {guide_npc_name}から{faction_name}の最初の依頼を受けた。
      reward_unlock_summary: Harbor Seal unlocked the breakwater route.
      reward_use_narrative: >-
        {player_name}は{starter_location_name}で{reward_name}を掲げ、
        {faction_name}にbreakwaterへの道を開く許しを受けた。
      reward_location_memory: >-
        {starter_location_name}で{reward_name}が使われ、breakwaterへの道が解放された。
      reward_world_memory: >-
        {player_name}は{reward_name}を使い、{faction_name}の次の依頼段階への道を開いた。
    locations:
      quay:
        id: ember_quay
        starter: true
        name: Ember Quay
        description: The harborfront landing where new arrivals meet the wardens and the tide's first rumors.
        hierarchy: city
        region: inner_harbor
        kind: landing
        danger_level: low
        facilities:
          - notice rail
          - warden booth
        public_state:
          public_trust: 1
          crowd_tension: 1
        related_factions:
          - ember_wardens
          - dockside_runners
        related_world_axes:
          - harbor_stability
          - rumor_current
        rumor_surface:
          - stamped favors
          - missing tide notices
      tide_market:
        id: tide_market
        name: Tide Market
        description: Salt-marked stalls and notice rails where records, bargains, and half-heard reports collect.
        hierarchy: city
        region: inner_harbor
        kind: market
        danger_level: low
        facilities:
          - scribe table
          - tide stalls
        public_state:
          record_clarity: 1
          rumor_density: 2
        related_factions:
          - tide_recorders
          - dockside_runners
        related_world_axes:
          - rumor_current
          - harbor_stability
        rumor_surface:
          - contradictory manifests
          - paid messages
      breakwater:
        id: breakwater
        name: Cinder Breakwater
        description: A sealed outer path along the harbor wall, opened only when the wardens recognize a seal.
        hierarchy: outer_route
        region: harbor_wall
        kind: sealed_path
        danger_level: medium
        facilities:
          - beacon housing
          - locked gate
        public_state:
          gate_status: sealed
          beacon_confidence: 1
        related_factions:
          - ember_wardens
        related_world_axes:
          - harbor_stability
          - breakwater_risk
        rumor_surface:
          - dimmed beacon reports
          - names near the gate
    routes:
      - route_key: quay_to_market
        from: quay
        to: tide_market
        status: open
        travel_summary: The market road opens inland, where tide reports and dockside favors get sorted.
        unlock_requirements: {}
      - route_key: market_to_quay
        from: tide_market
        to: quay
        status: open
        travel_summary: The road back to Ember Quay stays clear, carrying every rumor toward the harborfront.
        unlock_requirements: {}
      - route_key: quay_to_breakwater
        from: quay
        to: breakwater
        status: locked
        travel_summary: The breakwater gate stays sealed until the wardens accept the seal's authority.
        unlock_requirements:
          starter_item_effect: unlock_breakwater_route
      - route_key: breakwater_to_quay
        from: breakwater
        to: quay
        status: locked
        travel_summary: The outer wall bends back toward Ember Quay once the seal has opened the route.
        unlock_requirements:
          starter_item_effect: unlock_breakwater_route
    faction:
      id: ember_wardens
      name: Ember Wardens
      description: Harbor keepers who turn small favors into standing and keep the outer wall secure.
      state:
        doctrine: steady the harbor and reward reliable hands
    world_axes:
      - id: harbor_stability
        display_name: Harbor Stability
        description: How steadily the public harbor keeps routes, trust, and notices moving.
        min_value: 0
        max_value: 100
        initial_value: 56
        thresholds:
          - key: strained
            label: Strained Harbor
            value: 30
            description: Wardens narrow access and rumors travel faster than records.
          - key: steady
            label: Steady Harbor
            value: 60
            description: Public trust is strong enough for favors to become routes.
      - id: rumor_current
        display_name: Rumor Current
        description: How strongly dockside reports move through the market and quay.
        min_value: 0
        max_value: 100
        initial_value: 34
        thresholds:
          - key: low_tide
            label: Low Tide
            value: 20
            description: Rumors stay local and easy to verify.
          - key: flood_tide
            label: Flood Tide
            value: 70
            description: Half-heard notices start shaping public choices.
      - id: breakwater_risk
        display_name: Breakwater Risk
        description: Pressure around the sealed outer wall and the harbor lights beyond it.
        min_value: 0
        max_value: 100
        initial_value: 62
        thresholds:
          - key: watchful
            label: Watchful
            value: 45
            description: The wall is tense but controlled.
          - key: exposed
            label: Exposed
            value: 75
            description: The outer wall begins drawing urgent attention.
    factions:
      - id: ember_wardens
        name: Ember Wardens
        description: Harbor keepers who turn small favors into standing and keep the outer wall secure.
        policy: steady the harbor and reward reliable hands
        influence_scope:
          - quay
          - breakwater
        initial_standing: 0.0
        relationships:
          tide_recorders: 0.35
          dockside_runners: 0.2
        world_axis_interests:
          harbor_stability: 1.0
          breakwater_risk: -0.6
        location_keys:
          - quay
          - breakwater
        npc_names:
          - Runner Eska
          - Beacon-Keeper Sol
      - id: tide_recorders
        name: Tide Recorders
        description: Scribes and market witnesses who keep conflicting harbor reports coherent.
        policy: preserve public records before rumors overwrite them
        influence_scope:
          - tide_market
        initial_standing: 0.0
        relationships:
          ember_wardens: 0.35
          dockside_runners: 0.15
        world_axis_interests:
          rumor_current: -0.5
          harbor_stability: 0.7
        location_keys:
          - tide_market
        npc_names:
          - Tide-Scribe Miro
      - id: dockside_runners
        name: Dockside Runners
        description: Message carriers and quay regulars who move notices before officials can sort them.
        policy: keep information moving even when the harbor hesitates
        influence_scope:
          - quay
          - tide_market
        initial_standing: 0.0
        relationships:
          ember_wardens: 0.2
          tide_recorders: 0.15
        world_axis_interests:
          rumor_current: 0.8
          harbor_stability: 0.2
        location_keys:
          - quay
          - tide_market
        npc_names:
          - Runner Eska
    npc_memory_policy:
      remember_player_interactions: true
      remember_local_public_events: true
      remember_faction_events: true
      remember_history_events: true
      remember_relationship_changes: true
      expose_recent_limit: 5
    history_rules:
      - id: harbor_rumor_record
        level: local_rumor
        description: Public harbor actions become local rumor when they touch the quay or market.
        trigger_tags:
          - public_help
          - noticed_report
        world_axis_refs:
          - rumor_current
        faction_refs:
          - dockside_runners
        location_refs:
          - quay
          - tide_market
        npc_refs:
          - Runner Eska
        minimum_salience: 0.35
      - id: breakwater_faction_record
        level: faction_record
        description: Breakwater actions become warden records when they affect the outer wall.
        trigger_tags:
          - route_unsealed
          - beacon_steadied
        world_axis_refs:
          - harbor_stability
          - breakwater_risk
        faction_refs:
          - ember_wardens
        location_refs:
          - breakwater
        npc_refs:
          - Beacon-Keeper Sol
        minimum_salience: 0.6
    title_rules:
      - id: harbor_seal_bearer
        display_name: Harbor Seal Bearer
        description: Recognized by wardens for turning small help into public trust.
        action_tags:
          - help
          - protect
        world_axis_refs:
          - harbor_stability
        faction_refs:
          - ember_wardens
        location_refs:
          - quay
        npc_refs:
          - Runner Eska
        progress_target: 3
      - id: tide_listener
        display_name: Tide Listener
        description: Known for tracing rumors before they become harbor fact.
        action_tags:
          - investigate
          - negotiate
        world_axis_refs:
          - rumor_current
        faction_refs:
          - tide_recorders
        location_refs:
          - tide_market
        npc_refs:
          - Tide-Scribe Miro
        progress_target: 2
    consequence_rules:
      - id: steady_harbor_help
        action_tag: help
        outcome_tags:
          - public_help
        world_axis_deltas:
          harbor_stability: 2
          rumor_current: 1
        faction_standing_deltas:
          ember_wardens: 0.03
        location_public_state_deltas:
          quay:
            public_trust: 1
        npc_memory_drafts:
          - npc_name: Runner Eska
            scope: actor
            summary: The player helped turn a quay favor into public trust.
        rumor_draft: Dockside runners repeat who helped steady the quay.
        history_candidate_level: local_rumor
        history_rule_id: harbor_rumor_record
        title_progress_deltas:
          harbor_seal_bearer: 1
      - id: investigate_tide_reports
        action_tag: investigate
        outcome_tags:
          - noticed_report
        world_axis_deltas:
          rumor_current: -1
          harbor_stability: 1
        faction_standing_deltas:
          tide_recorders: 0.04
        location_public_state_deltas:
          tide_market:
            record_clarity: 1
        npc_memory_drafts:
          - npc_name: Tide-Scribe Miro
            scope: actor
            summary: The player helped sort a conflicting tide report.
        rumor_draft: Market scribes note which reports were checked before spreading.
        history_candidate_level: local_rumor
        history_rule_id: harbor_rumor_record
        title_progress_deltas:
          tide_listener: 1
      - id: protect_breakwater
        action_tag: protect
        outcome_tags:
          - beacon_steadied
        world_axis_deltas:
          harbor_stability: 2
          breakwater_risk: -2
        faction_standing_deltas:
          ember_wardens: 0.05
        location_public_state_deltas:
          breakwater:
            beacon_confidence: 1
        npc_memory_drafts:
          - npc_name: Beacon-Keeper Sol
            scope: location
            summary: The player helped keep the breakwater lights steady.
        rumor_draft: The outer wall keeps the player's name near the beacon.
        history_candidate_level: faction_record
        history_rule_id: breakwater_faction_record
        title_progress_deltas:
          harbor_seal_bearer: 1
    quest:
      id: starter_harbor_request
      title: First Harbor Request
      description: Help a dockside local, report what you found, and earn the wardens' trust.
      stage_key: starter_harbor
      unlock_requirements: {}
      completion_target: 2
      reward_template_key: harbor_seals
      reward_name: Harbor Seal
      reward_description: A stamped harbor seal that marks the bearer as a trusted hand along the quay.
      state:
        reward_enabled: true
        reward_effect_kind: unlock_breakwater_route
        reward_effect_payload:
          unlock_stage_key: breakwater_unsealed
    followup_quest:
      id: followup_breakwater
      title: Breakwater Unsealed
      description: Carry the harbor's trust out to the breakwater and steady what waits beyond the gate.
      stage_key: breakwater_unsealed
      unlock_requirements:
        starter_item_effect: unlock_breakwater_route
      completion_target: 1
      reward_template_key: none
      reward_name: ""
      reward_description: ""
      state:
        reward_enabled: false
    character:
      rank: Rook
      hp: 10
      focus: 5
      status_json:
        origin: ember_harbor
        onboarding: starter_slice
