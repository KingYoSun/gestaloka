world_templates:
  founders_reach:
    template_id: founders_reach
    display_name: Founders Reach
    summary: A lantern-lit plaza watched by archivists, couriers, and wardens.
    world:
      world_id: founders_reach
      default_name: Founders Reach
    roles:
      starter_location_key: square
      lore_location_key: archive_steps
      followup_location_key: watch_path
      guide_npc_name: Courier Pell
      starter_stage_key: starter_watch
      followup_stage_key: watch_path_followup
      opening_chapter_key: founders_watch_opening
      followup_chapter_key: watch_path_followup
      reward_effect_kind: unlock_followup_watch_path
      followup_branches:
        formal_path:
          branch_key: watch_oath
          label: Watch Oath
          summary: Watch Oath keeps the route aligned with recorded promises and public trust.
          committed_summary: The follow-up route has committed to Watch Oath, binding the watch path to recorded promises and public trust.
          player_hint: The chapter now leans toward Watch Oath and the duties the watch can openly recognize.
          signal_weights:
            formal_trust: 0.12
            kept_formal_promise: 0.15
            rumor_curiosity: -0.02
            street_pull: -0.02
            public_scrutiny: 0.03
            reward_item_commitment: 0.1
          anchor_npcs:
            - Archivist Nera
        undercurrent_path:
          branch_key: lantern_whispers
          label: Lantern Whispers
          summary: Lantern Whispers follows quiet reports, offstage movement, and what the lanterns half-reveal.
          committed_summary: The follow-up route has committed to Lantern Whispers, carrying the watch path through quiet reports and offstage echoes.
          player_hint: The chapter now leans toward Lantern Whispers and the quieter pull around the watch path.
          signal_weights:
            formal_trust: -0.02
            kept_formal_promise: -0.03
            rumor_curiosity: 0.12
            street_pull: 0.12
            public_scrutiny: 0.08
            reward_item_commitment: 0.02
          anchor_npcs:
            - Courier Pell
            - Lamplighter Sera
    bootstrap:
      start_consequence_summary: The watch waits for your first move.
      session_started_narrative: >-
        {player_name}は{starter_location_name}でセッションを開始し、
        {guide_npc_name}から{faction_name}の最初の依頼を受けた。
      reward_unlock_summary: Lantern Sigil unlocked the next watch path.
      reward_use_narrative: >-
        {player_name}は{starter_location_name}で{reward_name}を掲げ、
        {faction_name}に次の巡回路を開く許しを受けた。
      reward_location_memory: >-
        {starter_location_name}で{reward_name}が使われ、次の巡回路への道が解放された。
      reward_world_memory: >-
        {player_name}は{reward_name}を使い、{faction_name}の次の依頼段階への道を開いた。
    locations:
      square:
        id: founders_square
        starter: true
        name: Founders Square
        description: The public square where new sessions begin and the watch keeps first contact with newcomers.
        hierarchy: city
        region: central_reach
        kind: public_square
        danger_level: low
        facilities:
          - notice lantern
          - watch post
        public_state:
          public_trust: 1
          watch_visibility: 2
        related_factions:
          - founders_watch
          - courier_ring
        related_world_axes:
          - public_trust
          - watch_pressure
        rumor_surface:
          - first promises
          - lantern notices
      archive_steps:
        id: archive_steps
        name: Archive Steps
        description: Stone steps rise toward the archive, where careful records and older promises linger.
        hierarchy: city
        region: central_reach
        kind: archive_approach
        danger_level: low
        facilities:
          - public ledgers
          - record alcove
        public_state:
          memory_clarity: 2
          public_trust: 1
        related_factions:
          - archive_circle
          - founders_watch
        related_world_axes:
          - memory_coherence
          - public_trust
        rumor_surface:
          - old oaths
          - names entered in ledgers
      watch_path:
        id: watch_path
        name: Watch Path
        description: A narrow lantern path beyond the square, opened only when the sigil's trust is recognized.
        hierarchy: outer_route
        region: lantern_edge
        kind: patrol_path
        danger_level: medium
        facilities:
          - patrol lanterns
          - watch markers
        public_state:
          route_confidence: 1
          patrol_pressure: 2
        related_factions:
          - founders_watch
          - lantern_keepers
        related_world_axes:
          - watch_pressure
          - public_trust
        rumor_surface:
          - late patrols
          - lamps burning too low
    routes:
      - route_key: square_to_archive
        from: square
        to: archive_steps
        status: open
        travel_summary: Stone steps stand open toward the archive, where older records wait above the square.
        unlock_requirements: {}
      - route_key: archive_to_square
        from: archive_steps
        to: square
        status: open
        travel_summary: The steps back down to the square are clear, carrying every rumor back into the open.
        unlock_requirements: {}
      - route_key: square_to_watch_path
        from: square
        to: watch_path
        status: locked
        travel_summary: A dim watch path lies beyond the plaza, but the way stays closed until the sigil is honored.
        unlock_requirements:
          starter_item_effect: unlock_followup_watch_path
      - route_key: watch_path_to_square
        from: watch_path
        to: square
        status: locked
        travel_summary: The lantern path bends back toward the square once its trust has been opened.
        unlock_requirements:
          starter_item_effect: unlock_followup_watch_path
    faction:
      id: founders_watch
      name: Founders Watch
      description: Wardens who keep the plaza calm and turn first impressions into standing.
      state:
        doctrine: protect the reach and reward reliable help
    world_axes:
      - id: public_trust
        display_name: Public Trust
        description: How much the square accepts visible help, public promises, and watch recognition.
        min_value: 0
        max_value: 100
        initial_value: 52
        thresholds:
          - key: doubtful
            label: Doubtful
            value: 25
            description: The square hesitates before accepting new promises.
          - key: trusted
            label: Trusted
            value: 65
            description: Public help is easy for the watch to recognize.
      - id: memory_coherence
        display_name: Memory Coherence
        description: How clearly shared records preserve what happened around the plaza.
        min_value: 0
        max_value: 100
        initial_value: 58
        thresholds:
          - key: fragmented
            label: Fragmented
            value: 30
            description: Older promises conflict with newer reports.
          - key: legible
            label: Legible
            value: 70
            description: The archive can turn events into reliable public memory.
      - id: watch_pressure
        display_name: Watch Pressure
        description: The amount of tension placed on patrols, lantern routes, and public order.
        min_value: 0
        max_value: 100
        initial_value: 42
        thresholds:
          - key: calm
            label: Calm
            value: 20
            description: The watch can observe without narrowing access.
          - key: strained
            label: Strained
            value: 75
            description: Patrols become more visible and choices feel watched.
    factions:
      - id: founders_watch
        name: Founders Watch
        description: Wardens who keep the plaza calm and turn first impressions into standing.
        policy: protect the reach and reward reliable help
        influence_scope:
          - square
          - watch_path
        initial_standing: 0.0
        relationships:
          archive_circle: 0.4
          courier_ring: 0.25
          lantern_keepers: 0.35
        world_axis_interests:
          public_trust: 1.0
          watch_pressure: -0.5
        location_keys:
          - square
          - watch_path
        npc_names:
          - Courier Pell
          - Lamplighter Sera
      - id: archive_circle
        name: Archive Circle
        description: Record keepers who preserve promises before rumor can distort them.
        policy: make shared memory legible enough to be trusted
        influence_scope:
          - archive_steps
        initial_standing: 0.0
        relationships:
          founders_watch: 0.4
          courier_ring: 0.2
          lantern_keepers: 0.15
        world_axis_interests:
          memory_coherence: 1.0
          public_trust: 0.4
        location_keys:
          - archive_steps
        npc_names:
          - Archivist Nera
      - id: courier_ring
        name: Courier Ring
        description: Message carriers who hear how the square answers a promise.
        policy: keep notices moving between public record and street rumor
        influence_scope:
          - square
          - archive_steps
        initial_standing: 0.0
        relationships:
          founders_watch: 0.25
          archive_circle: 0.2
          lantern_keepers: 0.2
        world_axis_interests:
          public_trust: 0.5
          memory_coherence: 0.4
        location_keys:
          - square
          - archive_steps
        npc_names:
          - Courier Pell
      - id: lantern_keepers
        name: Lantern Keepers
        description: Route tenders who read the watch path through light, patrol rhythm, and quiet changes.
        policy: keep the outer route visible without letting pressure close it
        influence_scope:
          - watch_path
        initial_standing: 0.0
        relationships:
          founders_watch: 0.35
          archive_circle: 0.15
          courier_ring: 0.2
        world_axis_interests:
          watch_pressure: -0.7
          public_trust: 0.3
        location_keys:
          - watch_path
        npc_names:
          - Lamplighter Sera
    npc_memory_policy:
      remember_player_interactions: true
      remember_local_public_events: true
      remember_faction_events: true
      remember_history_events: true
      remember_relationship_changes: true
      expose_recent_limit: 5
    history_rules:
      - id: square_rumor_record
        level: local_rumor
        description: Public help in the square becomes rumor before it becomes formal record.
        trigger_tags:
          - public_help
          - promise_kept
        world_axis_refs:
          - public_trust
        faction_refs:
          - courier_ring
          - founders_watch
        location_refs:
          - square
        npc_refs:
          - Courier Pell
        minimum_salience: 0.35
      - id: archive_regional_record
        level: regional_record
        description: Investigations and fulfilled promises become regional records when the archive can preserve them.
        trigger_tags:
          - memory_preserved
          - record_checked
        world_axis_refs:
          - memory_coherence
        faction_refs:
          - archive_circle
        location_refs:
          - archive_steps
        npc_refs:
          - Archivist Nera
        minimum_salience: 0.55
      - id: watch_path_faction_record
        level: faction_record
        description: Watch path actions become faction record when patrol pressure changes.
        trigger_tags:
          - path_protected
          - patrol_steadied
        world_axis_refs:
          - watch_pressure
          - public_trust
        faction_refs:
          - founders_watch
          - lantern_keepers
        location_refs:
          - watch_path
        npc_refs:
          - Lamplighter Sera
        minimum_salience: 0.6
    title_rules:
      - id: trusted_wayfarer
        display_name: Trusted Wayfarer
        description: Recognized for making public promises easier to trust.
        action_tags:
          - help
          - protect
        world_axis_refs:
          - public_trust
        faction_refs:
          - founders_watch
        location_refs:
          - square
        npc_refs:
          - Courier Pell
        progress_target: 3
      - id: memory_witness
        display_name: Memory Witness
        description: Known by archivists for preserving what the square might otherwise forget.
        action_tags:
          - investigate
          - restore
        world_axis_refs:
          - memory_coherence
        faction_refs:
          - archive_circle
        location_refs:
          - archive_steps
        npc_refs:
          - Archivist Nera
        progress_target: 2
    consequence_rules:
      - id: public_help_builds_trust
        action_tag: help
        outcome_tags:
          - public_help
          - promise_kept
          - earned_trust
          - kept_promise
        world_axis_deltas:
          public_trust: 2
          watch_pressure: -1
        faction_standing_deltas:
          founders_watch: 0.03
          courier_ring: 0.02
        location_public_state_deltas:
          square:
            public_trust: 1
        npc_memory_drafts:
          - npc_name: Courier Pell
            scope: actor
            summary: The player helped make a public promise easier to trust.
        rumor_draft: Couriers repeat that a newcomer kept a visible promise in the square.
        history_candidate_level: local_rumor
        history_rule_id: square_rumor_record
        title_progress_deltas:
          trusted_wayfarer: 1
      - id: investigate_archive_memory
        action_tag: investigate
        outcome_tags:
          - record_checked
          - memory_preserved
          - careful_observation
        world_axis_deltas:
          memory_coherence: 2
          public_trust: 1
        faction_standing_deltas:
          archive_circle: 0.04
        location_public_state_deltas:
          archive_steps:
            memory_clarity: 1
        npc_memory_drafts:
          - npc_name: Archivist Nera
            scope: actor
            summary: The player helped compare a live report against the public record.
        rumor_draft: The archive steps keep a cleaner version of the report.
        history_candidate_level: regional_record
        history_rule_id: archive_regional_record
        title_progress_deltas:
          memory_witness: 1
      - id: protect_watch_path
        action_tag: protect
        outcome_tags:
          - path_protected
          - patrol_steadied
          - kept_promise
          - reward_item_respect
        world_axis_deltas:
          public_trust: 1
          watch_pressure: -2
        faction_standing_deltas:
          founders_watch: 0.04
          lantern_keepers: 0.03
        location_public_state_deltas:
          watch_path:
            route_confidence: 1
        npc_memory_drafts:
          - npc_name: Lamplighter Sera
            scope: location
            summary: The player helped keep the watch path visible without raising pressure.
        rumor_draft: The lantern route carries the player's name in low voices.
        history_candidate_level: faction_record
        history_rule_id: watch_path_faction_record
        title_progress_deltas:
          trusted_wayfarer: 1
    quest:
      id: starter_watch_request
      title: First Watch Request
      description: Help a local traveler, report back what you learned, and earn the watch's trust.
      stage_key: starter_watch
      unlock_requirements: {}
      completion_target: 2
      reward_template_key: lantern_sigils
      reward_name: Lantern Sigil
      reward_description: A stamped sigil from the watch that marks the bearer as a trusted helper.
      state:
        reward_enabled: true
        reward_effect_kind: unlock_followup_watch_path
        reward_effect_payload:
          unlock_stage_key: watch_path_followup
    followup_quest:
      id: followup_watch_path
      title: Watch Path Unsealed
      description: Carry the sigil's trust into the next watch path and steady the square for the watch.
      stage_key: watch_path_followup
      unlock_requirements:
        starter_item_effect: unlock_followup_watch_path
      completion_target: 1
      reward_template_key: none
      reward_name: ""
      reward_description: ""
      state:
        reward_enabled: false
    character:
      rank: Wayfarer
      hp: 10
      focus: 5
      status_json:
        origin: founders_reach
        onboarding: starter_slice
