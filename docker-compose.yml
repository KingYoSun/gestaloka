      SWARM_TEST_TIMEOUT_MS: ${SWARM_TEST_TIMEOUT_MS:-1800000}
      SWARM_POLL_TIMEOUT_MS: ${SWARM_POLL_TIMEOUT_MS:-120000}
      SWARM_JUDGE_ENABLED: ${SWARM_JUDGE_ENABLED:-true}
      SWARM_JUDGE_MODEL_ID: ${SWARM_JUDGE_MODEL_ID:-}
      SWARM_JUDGE_TIMEOUT_MS: ${SWARM_JUDGE_TIMEOUT_MS:-120000}
      SWARM_EXPERIENCE_WARNING_THRESHOLD: ${SWARM_EXPERIENCE_WARNING_THRESHOLD:-3}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      MODEL_LITE_ID: ${MODEL_LITE_ID:-}
      MODEL_MAIN_ID: ${MODEL_MAIN_ID:-}
      PROMPT_DIR: /workspace/prompts
      CI: "1"
    volumes:
      - ./frontend:/workspace/frontend
      - ./tests:/workspace/tests
      - ./documents:/workspace/documents
      - ./prompts:/workspace/prompts
    depends_on:
      player-frontend:
        condition: service_healthy
      admin-frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    command:
      - /bin/sh
      - -eu
      - -c
      - |
          npm ci
          ln -sfn /workspace/frontend/node_modules /workspace/node_modules
          wait_for() {
            target="$$1"
            label="$$2"
            until node -e "fetch(process.argv[1]).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))" "$$target"; do
              echo "waiting for $$label at $$target"
              sleep 2
            done
          }
          wait_for http://127.0.0.1:8000/health backend
          wait_for http://127.0.0.1:5173 player-frontend
          wait_for http://127.0.0.1:5174 admin-frontend
          wait_for http://127.0.0.1:8080/realms/gestaloka/.well-known/openid-configuration keycloak
          if [ -n "$${E2E_SPEC:-}" ]; then
            npx playwright test "$$E2E_SPEC" --reporter=line
          else
            npx playwright test --reporter=line
          fi

