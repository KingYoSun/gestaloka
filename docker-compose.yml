services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: gestaloka-v2-postgres
    environment:
      POSTGRES_DB: gestaloka
      POSTGRES_USER: gestaloka
      POSTGRES_PASSWORD: gestaloka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestaloka -d gestaloka"]
      interval: 10s
      timeout: 5s
      retries: 5

  nebula-metad:
    image: vesoft/nebula-metad:v3.8.0
    container_name: gestaloka-v2-nebula-metad
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-metad
      - --ws_ip=nebula-metad
      - --port=9559
      - --data_path=/data/meta
    volumes:
      - nebula_meta_data:/data/meta
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/9559' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nebula-storaged:
    image: vesoft/nebula-storaged:v3.8.0
    container_name: gestaloka-v2-nebula-storaged
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-storaged
      - --ws_ip=nebula-storaged
      - --port=9779
      - --data_path=/data/storage
    depends_on:
      nebula-metad:
        condition: service_healthy
    volumes:
      - nebula_storage_data:/data/storage

  nebula-graphd:
    image: vesoft/nebula-graphd:v3.8.0
    container_name: gestaloka-v2-nebula-graphd
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-graphd
      - --ws_ip=nebula-graphd
      - --port=9669
    ports:
      - "9669:9669"
    depends_on:
      nebula-metad:
        condition: service_healthy
      nebula-storaged:
        condition: service_started

  nebula-init:
    image: vesoft/nebula-console:v3.8.0
    container_name: gestaloka-v2-nebula-init
    entrypoint: ["/bin/sh", "/usr/local/bin/nebula-init.sh"]
    depends_on:
      nebula-graphd:
        condition: service_started
    restart: "no"
    volumes:
      - ./docker/nebula-init.sh:/usr/local/bin/nebula-init.sh:ro

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: gestaloka-v2-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector:0.150.1
    container_name: gestaloka-v2-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: gestaloka-v2-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_started
      backend-canary:
        condition: service_started
      projection-worker:
        condition: service_started

  grafana:
    image: grafana/grafana:11.6.0
    container_name: gestaloka-v2-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  backend:
    build:
      context: ./backend
    container_name: gestaloka-v2-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      ALEMBIC_DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      PUBLIC_WS_BASE_URL: ws://localhost:8000
      OIDC_ISSUER_URL: http://keycloak:8080/realms/gestaloka
      OIDC_PUBLIC_ISSUER_URL: http://localhost:8080/realms/gestaloka
      PROMPT_DIR: /workspace/prompts
      EVAL_DATASET_DIR: /workspace/evals/datasets
      RELEASE_CONFIG_DIR: /workspace/config/release
      RELEASE_RUNTIME_CONFIG_NAME: current
      OTEL_SERVICE_NAME: gestaloka-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_METRICS_HOST: 0.0.0.0
      OTEL_METRICS_PORT: 9464
      CANARY_HEALTH_URL: http://backend-canary:8000/health
      GRAPH_PROJECTION_BACKEND: nebula
      NEBULA_HOST: nebula-graphd
      NEBULA_PORT: 9669
      NEBULA_SPACE: gestaloka_v2
      NEBULA_USER: root
      NEBULA_PASSWORD: nebula
      OPS_ADMIN_SUBS: demo-player-sub
    volumes:
      - ./backend:/app
      - ./prompts:/workspace/prompts
      - ./evals:/workspace/evals
      - ./config:/workspace/config
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      nebula-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  projection-worker:
    build:
      context: ./backend
    container_name: gestaloka-v2-projection-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      ALEMBIC_DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      PROMPT_DIR: /workspace/prompts
      EVAL_DATASET_DIR: /workspace/evals/datasets
      RELEASE_CONFIG_DIR: /workspace/config/release
      RELEASE_RUNTIME_CONFIG_NAME: current
      OTEL_SERVICE_NAME: gestaloka-projection-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_METRICS_HOST: 0.0.0.0
      OTEL_METRICS_PORT: 9466
      CANARY_HEALTH_URL: http://backend-canary:8000/health
      GRAPH_PROJECTION_BACKEND: nebula
      NEBULA_HOST: nebula-graphd
      NEBULA_PORT: 9669
      NEBULA_SPACE: gestaloka_v2
      NEBULA_USER: root
      NEBULA_PASSWORD: nebula
    volumes:
      - ./backend:/app
      - ./prompts:/workspace/prompts
      - ./evals:/workspace/evals
      - ./config:/workspace/config
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
      nebula-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    command: python -m app.worker

  frontend:
    build:
      context: ./frontend
    container_name: gestaloka-v2-frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8000
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: gestaloka
      VITE_KEYCLOAK_CLIENT_ID: gestaloka-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started
    command: npm run dev -- --host 0.0.0.0 --port 5173

  backend-canary:
    build:
      context: ./backend
    container_name: gestaloka-v2-backend-canary
    env_file:
      - .env
    environment:
      APP_RUNTIME_ROLE: canary
      DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      ALEMBIC_DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      PUBLIC_WS_BASE_URL: ws://localhost:8001
      OIDC_ISSUER_URL: http://keycloak:8080/realms/gestaloka
      OIDC_PUBLIC_ISSUER_URL: http://localhost:8080/realms/gestaloka
      PROMPT_DIR: /workspace/prompts
      EVAL_DATASET_DIR: /workspace/evals/datasets
      RELEASE_CONFIG_DIR: /workspace/config/release
      RELEASE_RUNTIME_CONFIG_NAME: candidate
      OTEL_SERVICE_NAME: gestaloka-backend-canary
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_METRICS_HOST: 0.0.0.0
      OTEL_METRICS_PORT: 9465
      CANARY_HEALTH_URL: ""
      GRAPH_PROJECTION_BACKEND: nebula
      NEBULA_HOST: nebula-graphd
      NEBULA_PORT: 9669
      NEBULA_SPACE: gestaloka_v2
      NEBULA_USER: root
      NEBULA_PASSWORD: nebula
      OPS_ADMIN_SUBS: demo-player-sub
    volumes:
      - ./backend:/app
      - ./prompts:/workspace/prompts
      - ./evals:/workspace/evals
      - ./config:/workspace/config
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      nebula-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  release-scheduler:
    build:
      context: ./backend
    container_name: gestaloka-v2-release-scheduler
    env_file:
      - .env
    environment:
      APP_RUNTIME_ROLE: primary
      DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      ALEMBIC_DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      PROMPT_DIR: /workspace/prompts
      EVAL_DATASET_DIR: /workspace/evals/datasets
      RELEASE_CONFIG_DIR: /workspace/config/release
      RELEASE_RUNTIME_CONFIG_NAME: current
      RELEASE_SCHEDULER_CRON: "0 3 * * *"
      RELEASE_SHADOW_LIMIT: 5
      OTEL_SERVICE_NAME: gestaloka-release-scheduler
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_METRICS_HOST: 0.0.0.0
      OTEL_METRICS_PORT: 9467
      CANARY_HEALTH_URL: http://backend-canary:8000/health
      GRAPH_PROJECTION_BACKEND: nebula
      NEBULA_HOST: nebula-graphd
      NEBULA_PORT: 9669
      NEBULA_SPACE: gestaloka_v2
      NEBULA_USER: root
      NEBULA_PASSWORD: nebula
    volumes:
      - ./backend:/app
      - ./prompts:/workspace/prompts
      - ./evals:/workspace/evals
      - ./config:/workspace/config
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
      backend-canary:
        condition: service_started
      otel-collector:
        condition: service_started
    command: python -m app.modules.eval_harness.scheduler loop

  frontend-e2e:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: gestaloka-v2-frontend-e2e
    working_dir: /workspace/frontend
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:5173
      CI: "1"
    volumes:
      - ./frontend:/workspace/frontend
      - ./tests:/workspace/tests
    depends_on:
      frontend:
        condition: service_started
      keycloak:
        condition: service_healthy
    command: sh -c "npm install && npm run test:e2e"

volumes:
  postgres_data:
  nebula_meta_data:
  nebula_storage_data:
