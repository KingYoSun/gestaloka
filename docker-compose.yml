services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: gestaloka-v2-postgres
    environment:
      POSTGRES_DB: gestaloka
      POSTGRES_USER: gestaloka
      POSTGRES_PASSWORD: gestaloka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestaloka -d gestaloka"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: gestaloka-v2-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: gestaloka-v2-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      ALEMBIC_DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      PUBLIC_WS_BASE_URL: ws://localhost:8000
      OIDC_ISSUER_URL: http://keycloak:8080/realms/gestaloka
      OIDC_PUBLIC_ISSUER_URL: http://localhost:8080/realms/gestaloka
      PROMPT_DIR: /workspace/prompts
    volumes:
      - ./backend:/app
      - ./prompts:/workspace/prompts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  projection-worker:
    build:
      context: ./backend
    container_name: gestaloka-v2-projection-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      ALEMBIC_DATABASE_URL: postgresql+psycopg://gestaloka:gestaloka@postgres:5432/gestaloka
      PROMPT_DIR: /workspace/prompts
    volumes:
      - ./backend:/app
      - ./prompts:/workspace/prompts
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m app.worker

  frontend:
    build:
      context: ./frontend
    container_name: gestaloka-v2-frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8000
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: gestaloka
      VITE_KEYCLOAK_CLIENT_ID: gestaloka-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started
    command: npm run dev -- --host 0.0.0.0 --port 5173

  frontend-e2e:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: gestaloka-v2-frontend-e2e
    working_dir: /workspace/frontend
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:5173
      CI: "1"
    volumes:
      - ./frontend:/workspace/frontend
      - ./tests:/workspace/tests
    depends_on:
      frontend:
        condition: service_started
      keycloak:
        condition: service_healthy
    command: sh -c "npm install && npm run test:e2e"

volumes:
  postgres_data:
