  frontend-e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    container_name: gestaloka-v2-frontend-e2e
    profiles:
      - e2e
    working_dir: /workspace/frontend
    network_mode: host
    environment:
      PLAYWRIGHT_BASE_URL: http://localhost:5173
      ADMIN_PLAYWRIGHT_BASE_URL: http://localhost:5174
      E2E_SPEC: ${E2E_SPEC:-}
      SWARM_RUN_ID: ${SWARM_RUN_ID:-}
      SWARM_RUN_GROUP_ID: ${SWARM_RUN_GROUP_ID:-}
      SWARM_RUN_GROUP_DIR: ${SWARM_RUN_GROUP_DIR:-}
