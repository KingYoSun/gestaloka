    static_configs:
      - targets: ["backend:9464"]
  - job_name: backend-canary
    static_configs:
      - targets: ["backend-canary:9465"]
  - job_name: projection-worker
    static_configs:
      - targets: ["projection-worker:9466"]
  - job_name: release-scheduler
    static_configs:
      - targets: ["release-scheduler:9467"]
