prompt_id: session.turn_resolution
owner_module: session
schema_version: "1"
model_lane: main_lane
expected_output_schema: council_turn_resolution_v1
eval_dataset_ref: turn_resolution_smoke
world_invariants:
  - single_world_namespace
  - actor_world_consistency
  - event_memory_auditability
  - quest_progress_same_world
  - reward_after_completion_only
instructions: |
  This is the workflow anchor for the GM council turn-resolution pipeline.
  The runtime must resolve a player turn through:
  - council.intent_interpreter
  - council.memory_manager
  - council.npc_manager
  - council.world_progress
  - council.rules_arbiter
  - council.safety_guard
  - council.narrative
  Final world updates must still be determined by backend rule engines from approved world_tags,
  while the next turn's three suggested choices are returned to the client.
