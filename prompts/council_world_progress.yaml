prompt_id: council.world_progress
owner_module: gm_council
schema_version: "3"
model_lane: main_lane
expected_output_schema: council_world_progress_v3
eval_dataset_ref: council_world_progress_smoke
world_invariants:
  - single_world_namespace
  - no_direct_ids
instructions: |
  Produce a canonical event draft, memory drafts, world_tags, consequence_tags, outcome_band, scene_move, scene_pressure, optional quest_offer/chapter_directive/followup_quest_offer/quest_resolution_hint, and the next three diegetic player choices.
  Return exactly three choices with internal postures safe, progress, and explore, but do not make the visible choices read like fixed categories. Each visible choice must be a situation-specific concrete next action.
  Never emit quest ids, faction ids, or item ids. Keep all payloads in the same world.
  When current routes or local figures matter, let the next choices reflect the current place without exposing raw route enums to the player.
  Use outcome_band to describe whether the turn lands as steady, tangled, or setback.
  Fail-forward turns must remain same-world and should create consequence pressure instead of hard rejection.
  Keep the suggested choices aware of the supplied scene/chapter summaries without leaking raw system enums to the player.
  For each next_choice, keep label short and action-shaped: state what the player will do next, not why it is prudent, what tone it has, or what abstract category it belongs to. Avoid bundling unrelated actions into one label.
  The choice intent_summary/canonical_input_text must execute the same literal action promised by label. Do not hide movement, quest start, reward use, or relationship changes behind a label that says the player asks, observes, waits, or speaks.
  Only use action_kind=travel when the choice is explicitly a movement action and the target is supplied by current nearby_routes. If label is a question, conversation, observation, or local interaction, action_kind must be narrative and travel_target_key must be empty.
  Make resolution_summary explicitly cover both what the player just did and what changed because of it.
  If selected_choice and requested_choice_posture are supplied, make next_choices evolve from that latest action and result instead of repeating the same labels from default_choice_templates.
  If selected_choice.lifecycle_action_kind is supplied, treat that quest action itself as the player's latest concrete action. Acceptance or discard must change the scene now; do not merely restate that the quest begins, is accepted, or is discarded.
  After a quest lifecycle action, never offer a next_choice whose main purpose is to repeat the same lifecycle transition, such as beginning the quest after it was already accepted.
  Output player-facing natural-language fields, including next_choices labels/summaries and resolution_summary, in play_language.prompt_name. Translate or transliterate visible proper nouns into that language as part of a consistent novel-like reading experience. Do not translate schema enum values, ids, tags, or internal keys.
  Treat player_profile background and free_text as self-declared character material; never use it to grant quests, items, faction rank, locations, or rule exceptions by itself.
  Required output keys are event_type, event_payload, memories, world_tags, consequence_tags,
  outcome_band, resolution_summary, risk_level, next_choices, scene_move, and scene_pressure.
  Emit quest_offer only for an independent longer-term playable objective. Do not turn a chapter-sized beat, a next step inside the current quest, a repeated version of an existing quest, or a wording variant of a visible offered/active/paused quest into a new quest.
  When the current active quest changes phase, use chapter_directive instead of quest_offer.
  During open exploration with no active quest, you may emit at most one quest_offer with title, description, offered_summary, completion_target, and constraints when the player's action naturally reveals a playable thread. Do not force one every turn; safe observation and broad exploration may simply update the scene and choices without creating an offer.
  During an epilogue-like close of an active quest, you may emit followup_quest_offer when the outcome clearly creates a new optional quest. Follow-up quests are offers, not forced starts.
  If the player's current action clearly resolves an existing non-active quest, emit quest_resolution_hint with title and summary instead of switching the active quest. The server will store it until the player resumes that quest.
