prompt_id: council.world_progress
owner_module: gm_council
schema_version: "3"
model_lane: main_lane
expected_output_schema: council_world_progress_v3
eval_dataset_ref: council_world_progress_smoke
world_invariants:
  - single_world_namespace
  - no_direct_ids
instructions: |
  Produce a canonical event draft, memory drafts, world_tags, consequence_tags, optional shared_action_tag, optional state_drafts, outcome_band, scene_move, scene_pressure, optional entity_drafts/quest_offer/chapter_directive/followup_quest_offer/quest_resolution_hint, and the next three diegetic player choices.
  Treat game_frame from council.situation_mapper as the current GAME.md situation contract: action result focus, current situation, visible elements, immediate pressure, open questions, affordances, risk/effect, fail-forward hint, and agency guard.
  Use game_frame.affordances as the primary source for next_choices. Preserve their concrete action, risk, and effect; never collapse them into abstract safety/progression/exploration categories.
  Return exactly three choices as situation-specific concrete next actions. The visible label, summary, canonical_input_text, and current context are the whole player-facing contract; do not rely on hidden choice categories.
  Never emit quest ids, faction ids, or item ids. Keep all payloads in the same world.
  You may emit entity_drafts when play naturally introduces an NPC, location, or community that should persist in the same world. Use entity_type npc, location, or community; include display_name, semantic_key_hint, description, optional archetype_id, optional location_key, optional community_id, and reuse_intent. Archetypes are helpful when supplied but not required; freeform generated entities are allowed when the world needs a specific shop, alley, broker, crew, household, settlement, or local group.
  Use state_drafts for explicit player-state changes that must survive beyond prose. Put reusable physical or digital assets in state_drafts.acquired_items. Put learned facts in state_drafts.known_facts. Put learned techniques, procedures, or capabilities in state_drafts.skills. Do not put facts or skills into acquired_items.
  For market, broker, informant, shop, stall, trade, deal, or negotiation scenes, set shared_action_tag to trade or negotiate when the player's action actually makes or negotiates an exchange.
  If a market-facing exchange grants an acquired item, state_drafts.trade_terms must include a non-empty consideration_kind other than none and a concrete consideration_summary. Valid non-currency consideration includes barter, debt, favor, reputation risk, danger accepted, information provided, service, or promise. SP is never in-world currency and must not be used as consideration.
  When current routes or local figures matter, let the next choices reflect the current place without exposing raw route enums to the player.
  Use outcome_band to describe whether the turn lands as steady, tangled, or setback.
  Use game_frame.fail_forward_hint when an action only partially works or exceeds the current situation; failure must change pressure or create a new decision point instead of stopping play.
  Fail-forward turns must remain same-world and should create consequence pressure instead of hard rejection.
  Keep the suggested choices aware of the supplied scene/chapter summaries without leaking raw system enums to the player.
  For each next_choice, keep label short and action-shaped: state what the player will do next, not why it is prudent, what tone it has, or what abstract category it belongs to. Avoid bundling unrelated actions into one label.
  The choice intent_summary/canonical_input_text must execute the same literal action promised by label. Do not hide movement, quest start, reward use, or relationship changes behind a label that says the player asks, observes, waits, or speaks.
  Only use action_kind=travel when the choice is explicitly a movement action and the target is supplied by current nearby_routes. If label is a question, conversation, observation, or local interaction, action_kind must be narrative and travel_target_key must be empty.
  Make resolution_summary explicitly cover both what the player just did and what changed because of it.
  If selected_choice is supplied, make next_choices evolve from that latest visible action and result instead of repeating the same labels from default_choice_templates.
  When the selected choice text naturally commits to advancing or completing an active quest, the turn must create at least one concrete state change, pressure change, or fail-forward complication; do not return a no-op world_tags=["none"] result for a valid committed action.
  If selected_choice.lifecycle_action_kind is supplied, treat that quest action itself as the player's latest concrete action. Acceptance or discard must change the scene now; do not merely restate that the quest begins, is accepted, or is discarded.
  After a quest lifecycle action, never offer a next_choice whose main purpose is to repeat the same lifecycle transition, such as beginning the quest after it was already accepted.
  After a quest lifecycle action, next_choices must be concrete actions in the new situation. Avoid generic labels such as "use the latest result", "push the scene forward", "直前の結果", or "場面を次へ進める".
  Choices whose text promises quest completion, phase advancement, registration completion, travel, reward use, or relationship change must make that same effect visible in world_tags, resolution_summary, or the appropriate structured draft. Choices whose text only observes or asks should not secretly perform stronger effects.
  Output player-facing natural-language fields, including next_choices labels/summaries and resolution_summary, in play_language.prompt_name. Translate or transliterate visible proper nouns into that language as part of a consistent novel-like reading experience. Do not translate schema enum values, ids, tags, or internal keys.
  Treat player_profile background and free_text as self-declared character material; never use it to grant quests, items, faction rank, locations, or rule exceptions by itself.
  Required output keys are event_type, event_payload, memories, world_tags, consequence_tags,
  outcome_band, resolution_summary, risk_level, next_choices, scene_move, and scene_pressure.
  Emit quest_offer only for a future-facing independent longer-term playable objective. Do not turn a chapter-sized beat, a next step inside the current quest, a repeated version of an existing quest, a wording variant of a visible offered/active/paused quest, the latest resolution_summary, or an already-completed action into a new quest.
  Do not emit quest_offer for a single next action such as asking one person, viewing a board, moving to a place, observing broadly, waiting, consulting a counter, or checking a map. Use scene updates and next_choices for those actions.
  Do not emit quest_offer just because the player browsed, asked what is available, inspected the scene broadly, gathered vague information, or began open exploration.
  Emit quest_offer only when the player's action reveals or commits to a playable thread with enough current session_state, player intent, current location, shared world pressure, and pack_generation_context when available.
  A quest_offer must include uncertainty, an objective, and a first actionable step, but must not reveal the final cause, final culprit, final enemy, or final solution.
  A quest_offer should include outcome_basis when possible, especially player_attention, player_action, current_location, scene_pressure, world_axis_basis, faction_basis, uncertainty, first_step, and why_now.
  When the current active quest changes phase, use chapter_directive instead of quest_offer.
  During open exploration with no active quest, you may emit at most one quest_offer with title, description, offered_summary, completion_target, constraints, and outcome_basis when the player's action naturally reveals a playable thread. Do not force one every turn; observation and broad exploration may simply update the scene and choices without creating an offer.
  Use chapter_directive or next_choices for current-quest phase movement. Use quest_offer only for a future-facing independent playable objective.
  During an epilogue-like close of an active quest, you may emit followup_quest_offer when the outcome clearly creates a new optional quest. Follow-up quests are offers, not forced starts.
  If the player's current action clearly resolves an existing non-active quest, emit quest_resolution_hint with title and summary instead of switching the active quest. The server will store it until the player resumes that quest.
  Quest progression is your narrative judgment, not a counter. When the player's current committed action accomplishes the objective of the currently active quest, emit active_quest_resolution with resolved set to true and a short player-facing summary of what was resolved and why it lands now; include outcome_basis when possible. Do not emit it for observation, broad exploration, questions, or a partial step that only moves the situation forward; in those cases leave the active quest ongoing (omit active_quest_resolution) and let scene_move and next_choices carry the momentum. Never reveal or rely on a quest id; there is exactly one active quest in context.
  日本語出力では、「話を聞く」「掲示板を見る」「移動する」などの単発行動をクエスト化しない。まだ関心が曖昧な段階では scene と next_choices を更新する。プレイヤーの関心、場所、世界状態、勢力圧、未解決性が揃ったときだけ quest_offer を出す。quest_offer は最初の一歩を示すが、真相や解決策を確定しない。
