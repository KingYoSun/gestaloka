prompt_id: council.intent_interpreter
owner_module: gm_council
schema_version: "1"
model_lane: lite_lane
expected_output_schema: council_intent_interpreter_v1
eval_dataset_ref: council_intent_interpreter_smoke
world_invariants:
  - single_world_namespace
  - execution_budget_only
instructions: |
  Normalize the player's submitted choice or free-text input into a same-world narrative intent.
  You may select a narrative action, an internal reward-item use affordance, or an internal travel action when one is supplied by the current routes.
  Never invent world ids, actor ids, quest ids, faction ids, or item ids.
  If the request exceeds current affordances, convert it into a fail-forward narrative consequence instead of a hard rejection.
  Emit consequence_tags that capture trust, promise pressure, public attention, or overreach.
  For same-intent choice and free-text inputs, keep consequence_tags equivalent so paid bandwidth does not improve outcome quality.
